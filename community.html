<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMMUNITY | AMK 포트폴리오 - 고윤호</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="bg-wrapper"></div>
    <nav class="navbar" id="navbar">
        <div class="logo">PORTFOLIO<span class="brand-highlight">.AMK</span></div>
        <div class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <ul class="nav-links" id="nav-links">
            <li><a href="index.html" class="nav-link">MISSION</a></li>
            <li><a href="challenger.html" class="nav-link">CHALLENGER</a></li>
            <li><a href="technical-arsenal.html" class="nav-link">TECHNICAL ARSENAL</a></li>
            <li><a href="project.html" class="nav-link">PROJECT</a></li>
            <li><a href="community.html" class="nav-link">COMMUNITY</a></li>
            <li><a href="contact.html" class="nav-link">CONTACT</a></li>
        </ul>
    </nav>
    <div id="fsm-indicator">
        <div class="fsm-dot"></div>
        <span id="fsm-text">현재 상태: IDLE / 대기 중</span>
    </div>
    <main class="main-content">
        <section class="section-container">
            <h2 class="section-title">기술 질문 및 동료 피드백 <span class="text-silver" style="font-size:0.5em; vertical-align:middle;">COMMUNITY</span></h2>
            
            <div class="board-container">
                <div class="board-actions">
                    <button id="btn-show-form">글쓰기</button>
                </div>

                <div id="form-container" class="form-container">
                    <form id="board-form" class="board-form">
                        <div class="form-group row-group">
                            <div style="flex:1;">
                                <label for="author">작성자</label>
                                <input type="text" id="author" placeholder="이름" required>
                            </div>
                            <div style="flex:1;">
                                <label for="password">비밀번호</label>
                                <input type="password" id="password" placeholder="수정/삭제 시 필요" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="content">내용</label>
                            <textarea id="content" rows="4" placeholder="자유롭게 기술 질문이나 피드백을 남겨주세요" required></textarea>
                        </div>
                        <div style="display: flex; gap: 10px;">
                            <button type="submit" style="flex: 1;">기록 남기기</button>
                            <button type="button" id="btn-hide-form" class="btn-danger" style="flex: 0.3;">취소</button>
                        </div>
                    </form>
                </div>

                <div id="posts-container" class="board-list">
                    <!-- Script loaded -->
                </div>
            </div>
        </section>
    </main>
    <footer>
        <div class="slogan">Applied Materials와 함께 무결성 0%에 도전합니다</div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
