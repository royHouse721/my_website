<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMMUNITY | AMK 포트폴리오 - 고윤호</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-wrapper bg-community"></div>
    <!-- Top Navigation -->
    <nav class="navbar">
        <div class="logo">PORTFOLIO<span class="brand-highlight">.AMK</span></div>
        <ul class="nav-links">
            <li><a href="index.html">VISION</a></li>
            <li><a href="challenger.html">CHALLENGER</a></li>
            <li><a href="technical-arsenal.html">TECHNICAL ARSENAL</a></li>
            <li><a href="community.html">COMMUNITY</a></li>
            <li><a href="dx-innovation.html">DX INNOVATION</a></li>
        </ul>
    </nav>

    <!-- FSM Indicator -->
    <div id="fsm-indicator">
        <div class="fsm-dot"></div>
        <span id="fsm-text">현재 상태: IDLE / 대기 중</span>
    </div>

    <!-- Main Content -->
    <main class="main-content">
        <h1 class="page-title">COMMUNITY</h1>
        <p class="page-description">방문자 여러분의 소중한 기록을 남겨주세요. 자유로운 질문과 요청사항을 환영합니다.</p>

        <div class="board-container">
            <!-- 글쓰기 폼 -->
            <form id="board-form" class="board-form">
                <div class="form-group">
                    <label for="author">작성자</label>
                    <input type="text" id="author" placeholder="이름 또는 소속을 입력하세요" required>
                </div>
                <div class="form-group">
                    <label for="content">내용</label>
                    <textarea id="content" rows="4" placeholder="자유롭게 의견을 남겨주세요" required></textarea>
                </div>
                <button type="submit" style="width: 100%; border-color: var(--color-white);">기록 남기기</button>
            </form>

            <!-- 글 목록 -->
            <div id="posts-container" class="board-list">
                <!-- script.js에서 로드됨 -->
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="slogan">Applied Materials와 함께 무결성 0%에 도전합니다</div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
